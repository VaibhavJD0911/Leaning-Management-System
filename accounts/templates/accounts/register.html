{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | LMS</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<div class="footer-line"></div>

<div class="container">
    <div class="card">

        <div class="card-brand">
            <div class="card-brand-dot"></div>
            <span class="card-brand-text">LMS Platform</span>
        </div>

        <h1>Create account</h1>
        <p class="card-subtitle">Join thousands of learners and educators.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="field-group">
                <label class="field-label" for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required autofocus>
            </div>

            <div class="field-group">
                <label class="field-label" for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="field-group">
                <label class="field-label" for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>

            <div class="field-group">
                <label class="field-label" for="role">Role</label>
                <select id="role" name="role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="student">Student</option>
                    <option value="instructor">Instructor</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <button class="btn primary" type="submit">Create account</button>
        </form>

        <a href="{% url 'login' %}" class="link">
            Already have an account? <span>Sign in</span>
        </a>

    </div>
</div>

</body>
</html>
